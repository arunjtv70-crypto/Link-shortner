<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB URL Shortener — AB GROUPS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04080F;
  --surface: #0A1020;
  --surface2: #101828;
  --border: #1C2D48;
  --border2: #243550;
  --accent: #00D4FF;
  --accent2: #7C5CFC;
  --gold: #FFB800;
  --green: #00E676;
  --red: #FF4D6A;
  --text: #EDF2FF;
  --muted: #4A6080;
  --muted2: #7A92B0;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG */
.bg-orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.08;
  animation: orbFloat 12s ease-in-out infinite alternate;
}
.orb1 { width:500px; height:500px; background:var(--accent); top:-100px; left:-100px; }
.orb2 { width:400px; height:400px; background:var(--accent2); bottom:-80px; right:-80px; animation-delay:-4s; }
.orb3 { width:300px; height:300px; background:var(--gold); top:40%; left:40%; animation-delay:-8s; }
@keyframes orbFloat { from{transform:translate(0,0) scale(1);} to{transform:translate(30px,20px) scale(1.1);} }

.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
}

/* ============ AUTH SCREEN ============ */
#authScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  background: var(--bg);
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 28px;
  padding: 44px 40px;
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(0,212,255,0.04);
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(30px) scale(0.95); }
  to { opacity:1; transform: translateY(0) scale(1); }
}

.auth-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  border-radius: 28px 28px 0 0;
}

.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo-badge {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 20px; color: white;
  box-shadow: 0 8px 28px rgba(0,212,255,0.3);
  margin-bottom: 12px;
}
.auth-logo h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 22px; color: var(--text);
}
.auth-logo p { color: var(--muted2); font-size: 13px; margin-top: 3px; }

.auth-tabs {
  display: flex; gap: 4px;
  background: var(--bg);
  border-radius: 12px; padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 9px;
  background: none; border: none;
  border-radius: 9px;
  color: var(--muted2);
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.04em;
}
.auth-tab.active {
  background: var(--surface2);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  padding: 13px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}
.form-input::placeholder { color: var(--muted); }

.auth-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px;
  padding: 14px;
  color: white;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 24px rgba(0,212,255,0.3);
  letter-spacing: 0.03em;
  margin-top: 8px;
}
.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,212,255,0.45); }
.auth-btn:active { transform: scale(0.98); }

.auth-error {
  background: rgba(255,77,106,0.08);
  border: 1px solid rgba(255,77,106,0.25);
  border-radius: 9px;
  padding: 10px 14px;
  color: var(--red);
  font-size: 13px;
  margin-top: 14px;
  display: none;
}
.auth-error.show { display: block; }

.auth-success {
  background: rgba(0,230,118,0.08);
  border: 1px solid rgba(0,230,118,0.25);
  border-radius: 9px;
  padding: 10px 14px;
  color: var(--green);
  font-size: 13px;
  margin-top: 14px;
  display: none;
}
.auth-success.show { display: block; }

.guest-btn {
  width: 100%; margin-top: 12px;
  background: none; border: 1px solid var(--border);
  border-radius: 11px; padding: 11px;
  color: var(--muted2); font-size: 13px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.guest-btn:hover { border-color: var(--border2); color: var(--text); }

/* SOCIAL LOGIN */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

.social-grid-icons {
  display: flex; flex-direction: row; justify-content: center;
  gap: 12px; margin-bottom: 4px;
}
.social-icon-btn {
  width: 48px; height: 48px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  flex-shrink: 0;
}
.social-icon-btn:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.3); }
.social-icon-btn:active { transform: scale(0.95); }

/* Social email modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(4,8,15,0.88); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 500;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px; padding: 32px 28px;
  max-width: 360px; width: 90%;
  animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.modal-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 20px 20px 0 0; }
.modal-icon { font-size: 36px; margin-bottom: 10px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--muted2); margin-bottom: 20px; line-height: 1.5; }
.modal-close { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.modal-close:hover { background: rgba(255,77,106,0.2); color: var(--red); }

/* ============ MAIN APP ============ */
#appScreen { display: none; position: relative; z-index: 1; }

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 20px 140px;
}

/* HEADER */
header {
  padding: 28px 0 18px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  background: rgba(4,8,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(28,45,72,0.5);
  margin: 0 -20px;
  padding-left: 20px; padding-right: 20px;
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo-badge {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 14px; color: white;
  box-shadow: 0 4px 16px rgba(0,212,255,0.25);
}
.logo-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 17px;
}
.logo-sub { font-size: 11px; color: var(--muted2); }

.header-right { display: flex; align-items: center; gap: 10px; }

.user-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 5px 14px 5px 8px;
}
.user-avatar {
  width: 26px; height: 26px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
  font-family: 'Syne', sans-serif;
}
.user-name { font-size: 12px; font-weight: 600; color: var(--text); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.logout-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 12px;
  color: var(--muted2); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'Syne', sans-serif;
  transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* HERO */
.hero { text-align: center; padding: 32px 0 24px; }
.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 800; line-height: 1.1; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 55%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p { color: var(--muted2); font-size: 14px; }

/* STATS */
.stats-strip {
  display: flex; gap: 10px; margin-bottom: 18px;
}
.stat-box {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 12px; text-align: center;
}
.stat-val {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; display: block;
}
.stat-lbl { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-top: 2px; }

/* SHORTENER CARD */
.shortener-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 22px; padding: 26px;
  margin-bottom: 18px; position: relative; overflow: hidden;
}
.shortener-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
}

.input-row { display: flex; gap: 10px; margin-bottom: 18px; }
.url-input {
  flex: 1; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 13px 16px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  outline: none; transition: all 0.2s;
}
.url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
.url-input::placeholder { color: var(--muted); }

.shorten-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px;
  padding: 13px 22px; color: white;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 14px;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
  box-shadow: 0 4px 18px rgba(0,212,255,0.3);
}
.shorten-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(0,212,255,0.45); }
.shorten-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.loading {
  display: none; align-items: center; gap: 10px;
  padding: 10px 0; color: var(--muted2); font-size: 13px;
}
.loading.show { display: flex; }
.spinner {
  width: 17px; height: 17px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.result-box {
  display: none; background: rgba(0,230,118,0.05);
  border: 1px solid rgba(0,230,118,0.2);
  border-radius: 14px; padding: 16px 18px;
  animation: slideUp 0.3s ease;
}
.result-box.show { display: block; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.result-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--green); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.result-label::before {
  content:''; width:6px; height:6px;
  background: var(--green); border-radius: 50%;
  animation: blink 1s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.result-link-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.short-link {
  flex: 1; font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 500;
  color: var(--accent); text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}
.short-link:hover { text-decoration: underline; }

.action-btn {
  border: none; border-radius: 9px;
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.copy-btn {
  background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.25); color: var(--accent);
}
.copy-btn:hover { background: rgba(0,212,255,0.2); }
.copy-btn.copied { background: rgba(0,230,118,0.12); border-color: rgba(0,230,118,0.3); color: var(--green); }
.open-btn {
  background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.25); color: var(--accent2);
}
.open-btn:hover { background: rgba(124,92,252,0.2); }

.error-box {
  display: none; background: rgba(255,77,106,0.07);
  border: 1px solid rgba(255,77,106,0.22);
  border-radius: 10px; padding: 11px 14px;
  color: var(--red); font-size: 13px; margin-top: 10px;
}
.error-box.show { display: block; }

/* HISTORY */
.history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px; padding: 22px 24px;
  margin-bottom: 18px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted2);
}
.count-badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px;
  font-size: 11px; font-weight: 700; color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
}
.clear-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted2);
  font-size: 10px; font-weight: 700; padding: 4px 10px;
  cursor: pointer; font-family: 'Syne', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.15s;
}
.clear-btn:hover { border-color: var(--red); color: var(--red); }

.history-empty {
  color: var(--muted); font-size: 13px;
  text-align: center; padding: 24px 0;
}

.history-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; animation: slideUp 0.3s ease;
  transition: border-color 0.2s;
}
.history-item:hover { border-color: rgba(0,212,255,0.3); }
.history-item:last-child { margin-bottom: 0; }
.history-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); min-width: 18px; text-align: center; }
.history-urls { flex: 1; min-width: 0; }
.history-short {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--accent); text-decoration: none;
  display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
}
.history-short:hover { text-decoration: underline; }
.history-orig { font-size: 11px; color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.history-time { font-size: 10px; color: var(--muted); margin-top: 1px; }
.history-actions { display: flex; gap: 5px; flex-shrink: 0; }
.h-btn {
  border: none; border-radius: 7px;
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.h-copy { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.h-copy:hover { background: rgba(0,212,255,0.2); }
.h-copy.copied { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.h-open { background: rgba(124,92,252,0.1); color: var(--accent2); border: 1px solid rgba(124,92,252,0.2); text-decoration: none; display: inline-flex; align-items: center; }
.h-open:hover { background: rgba(124,92,252,0.2); }

/* ============ AD SYSTEM ============ */
.ad-container {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 900; pointer-events: none; display: none;
}
.ad-wrapper { pointer-events: all; position: relative; }
.ad-skip {
  position: absolute; top: 8px; right: 10px;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6); border-radius: 6px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; transition: all 0.15s; z-index: 10;
}
.ad-skip:hover { background: rgba(0,0,0,0.9); color: white; }

.ad-progress { height: 2px; background: rgba(255,255,255,0.08); position: absolute; bottom: 0; left: 0; right: 0; }
.ad-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent)); transform-origin: left; transition: transform 0.5s linear; }

.ad { display: none; }
.ad.active { display: block; }

/* Banner */
.ad-banner {
  background: linear-gradient(90deg, #12050F, #0A0D1A, #051208);
  border-top: 2px solid var(--gold);
  padding: 10px 60px 12px 20px;
  display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap;
}
.ad-banner-text { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
.ab-logo-text { background: linear-gradient(135deg, var(--gold), #FF6B35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; font-size: 15px; }
.ad-enroll-btn {
  background: linear-gradient(135deg, var(--gold), #FF6B35);
  border: none; border-radius: 8px; padding: 7px 18px;
  color: white; font-weight: 700; font-size: 12px;
  cursor: pointer; font-family: 'Syne', sans-serif;
  transition: all 0.15s; text-decoration: none; display: inline-block;
  box-shadow: 0 3px 12px rgba(255,184,0,0.35);
}
.ad-enroll-btn:hover { transform: scale(1.05); box-shadow: 0 5px 18px rgba(255,184,0,0.55); }

/* Feature Card */
.ad-feature { background: linear-gradient(135deg, #0a1228, #160923, #081220); border-top: 2px solid transparent; border-image: linear-gradient(90deg, var(--gold),
